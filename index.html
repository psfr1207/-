*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;font-size:16px;color:#111;background:#f8f9fa;min-height:100vh}
#root{max-width:780px;margin:0 auto;padding:0 0 80px}
.btn{padding:10px 20px;border-radius:8px;border:1px solid rgba(0,0,0,0.18);background:#fff;color:#111;font-size:15px;cursor:pointer;transition:background 0.15s;font-family:inherit}
.btn:hover{background:#f0f0f0}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-green{background:#4ade80;border-color:#22c55e;color:#052e16;font-weight:600}
.btn-green:hover:not(:disabled){background:#22c55e}
.btn-blue{background:#dbeafe;border-color:#3b82f6;color:#1e3a8a;font-weight:600}
.btn-blue:hover:not(:disabled){background:#bfdbfe}
.btn-amber{background:#fef3c7;border-color:#d97706;color:#78350f;font-weight:600}
.btn-amber:hover:not(:disabled){background:#fde68a}
.btn-purple{background:#ede9fe;border-color:#7c3aed;color:#2e1065;font-weight:600}
.btn-purple:hover:not(:disabled){background:#ddd6fe}
.btn-excel{background:#166534;border-color:#14532d;color:#fff;font-weight:600}
.btn-excel:hover:not(:disabled){background:#14532d}
.btn-excel2{background:#0f3d20;border-color:#0a2912;color:#fff;font-weight:600}
.btn-excel2:hover:not(:disabled){background:#0a2912}
.card{background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:12px;padding:1.25rem}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600}
.badge-사실적{background:#dbeafe;color:#1e40af}
.badge-적용적{background:#fef3c7;color:#92400e}
.badge-전이적{background:#ede9fe;color:#4c1d95}
input[type=text],textarea{width:100%;padding:10px 12px;border:1px solid rgba(0,0,0,0.2);border-radius:8px;font-size:15px;color:#111;background:#fff;font-family:inherit;outline:none}
input[type=text]:focus,textarea:focus{border-color:#4ade80;box-shadow:0 0 0 3px rgba(74,222,128,0.15)}
textarea{resize:vertical;min-height:110px;line-height:1.7}
.opt-btn{width:100%;text-align:left;padding:13px 16px;border-radius:8px;border:1.5px solid rgba(0,0,0,0.12);background:#fff;color:#111;font-size:15px;cursor:pointer;transition:all 0.15s;margin-bottom:8px;font-family:inherit;line-height:1.5}
.opt-btn:hover{border-color:#4ade80;background:#f0fdf4}
.opt-btn.selected{border-color:#22c55e;background:#f0fdf4;color:#052e16;font-weight:600}
.progress-bar{height:6px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#4ade80;transition:width 0.3s ease}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 12px;background:#f1f5f9;text-align:left;font-weight:600;border-bottom:1px solid #e2e8f0;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr:hover td{background:#fafafa}
.sc{text-align:center;font-weight:600}
.page{padding:1.5rem 1rem}

/* ══════════════════════════════════════════
   GAS API 레이어
   — API 키는 서버(GAS)에만 있음
   — 클라이언트는 GAS_URL 만 알면 됨
══════════════════════════════════════════ */
async function gasPost(body) {
  const res  = await fetch(GAS_URL, {
    method:  'POST',
    headers: { 'Content-Type': 'text/plain' }, // GAS CORS 우회
    body:    JSON.stringify(body),
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || '서버 오류');
  return data;
}

async function gasGet(params) {
  const qs  = new URLSearchParams(params).toString();
  const res = await fetch(`${GAS_URL}?${qs}`);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || '서버 오류');
  return data;
}

// 중복 확인
async function apiCheck(sid, tt) {
  try { return (await gasGet({ action:'check', sid, tt })).exists; }
  catch { return false; }
}

// 서술형 채점 요청 → GAS 서버에서 Anthropic API 호출
async function apiGrade(questions, answers) {
  return (await gasPost({ action:'grade', questions, answers })).grades;
}

// 결과 저장
async function apiSave(result) {
  return gasPost({ action:'save', ...result });
}

// 전체 결과 조회
async function apiLoadAll() {
  return (await gasGet({ action:'all' })).results;
}

/* ══════════════════════════════════════════
   점수 계산
══════════════════════════════════════════ */
function calcScores(qs, answers, grades) {
  const s = { 사실적:0, 적용적:0, 전이적:0 };
  qs.forEach(q => {
    const sc = q.type === 'mc'
      ? (answers[q.id] === q.ans ? q.pts : 0)
      : ((grades && grades[q.id]) ? grades[q.id].score : 0);
    s[q.cat] += sc;
  });
  return { ...s, total: s.사실적 + s.적용적 + s.전이적 };
}

/* ══════════════════════════════════════════
   엑셀 내보내기
══════════════════════════════════════════ */
function exportExcel(allResults, groupFilter, filename) {
  const data = allResults.filter(r => !groupFilter || r.group === groupFilter);
  if (!data.length) { alert('내보낼 데이터가 없습니다.'); return; }

  const map = {};
  data.forEach(r => {
    if (!map[r.studentId]) map[r.studentId] = { ID:r.studentId, GRP:r.group };
    map[r.studentId][r.testType] = r.scores;
  });

  const COL  = ['학생ID','집단','01_총점','01_사실','01_적용','01_전이','02_총점','02_사실','02_적용','02_전이','03_총점','03_사실','03_적용','03_전이'];
  const H1   = ['학생ID','집단','사전검사(A형)','','','','즉각사후검사(B형)','','','','파지검사(C형)','','',''];
  const H2   = ['','','01_총점','01_사실','01_적용','01_전이','02_총점','02_사실','02_적용','02_전이','03_총점','03_사실','03_적용','03_전이'];
  const TMAP = { '01':'A','02':'B','03':'C' };
  const CMAP = { '총점':'total','사실':'사실적','적용':'적용적','전이':'전이적' };

  const buildSheet = src => {
    const rows = Object.values(src).sort((a,b)=>a.ID.localeCompare(b.ID)).map(s =>
      COL.map(c => {
        if (c==='학생ID') return s.ID;
        if (c==='집단')   return s.GRP;
        const [p,cat] = c.split('_');
        const sc = s[TMAP[p]];
        return sc != null ? sc[CMAP[cat]] : '';
      })
    );
    const ws = XLSX.utils.aoa_to_sheet([H1,H2,...rows]);
    ws['!cols']   = COL.map((_,i) => ({ wch: i<2?14:9 }));
    ws['!merges'] = [
      {s:{r:0,c:0},e:{r:1,c:0}},{s:{r:0,c:1},e:{r:1,c:1}},
      {s:{r:0,c:2},e:{r:0,c:5}},{s:{r:0,c:6},e:{r:0,c:9}},{s:{r:0,c:10},e:{r:0,c:13}}
    ];
    return ws;
  };

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, buildSheet(map), groupFilter||'전체');
  if (!groupFilter) {
    ['설명집단','질문집단'].forEach(g => {
      const gd = allResults.filter(r=>r.group===g);
      if (!gd.length) return;
      const gm = {};
      gd.forEach(r=>{ if(!gm[r.studentId]) gm[r.studentId]={ID:r.studentId,GRP:r.group}; gm[r.studentId][r.testType]=r.scores; });
      XLSX.utils.book_append_sheet(wb, buildSheet(gm), g);
    });
  }
  XLSX.writeFile(wb, filename);
}

function ExamInterface({ studentId, group, testType, onDone }) {
  const exam   = EXAMS[testType];
  const qs     = exam.qs;
  const [idx, setIdx]         = useState(0);
  const [answers, setAnswers] = useState({});
  const [grading, setGrading] = useState(false);
  const [prog, setProg]       = useState(0);
  const [progMsg, setProgMsg] = useState('');
  const q      = qs[idx];
  const mcDone = qs.filter(q=>q.type==='mc').every(q=>answers[q.id]!==undefined);
  const setAns = (qid, val) => setAnswers(prev=>({...prev,[qid]:val}));

  const submit = async () => {
    setGrading(true);

    // 1) 서술형 채점 요청 → GAS 서버가 Anthropic 호출
    const essayQs = qs.filter(x=>x.type==='essay');
    const essayAnswers = {};
    essayQs.forEach(q => { essayAnswers[q.id] = answers[q.id] || ''; });

    setProg(10); setProgMsg('서술형 AI 채점 중... (서버 처리)');
    let grades = {};
    try {
      grades = await apiGrade(
        essayQs.map(q=>({id:q.id, q:q.q, model:q.model, keys:q.keys})),
        essayAnswers
      );
    } catch (err) {
      console.error('채점 오류:', err);
      essayQs.forEach(q => { grades[q.id] = { score:0, feedback:'채점 오류' }; });
    }

    // 2) 점수 계산
    setProg(70); setProgMsg('점수 집계 중...');
    const scores = calcScores(qs, answers, grades);

    // 3) 저장
    setProg(85); setProgMsg('Google Sheets에 저장 중...');
    try {
      await apiSave({ studentId, group, testType, examLabel:exam.label, scores, answers, grades, timestamp:Date.now() });
    } catch (err) {
      console.error('저장 오류:', err);
    }

    setProg(100); setProgMsg('완료!');
    await new Promise(r=>setTimeout(r,500));
    setGrading(false);
    onDone();
  };

  if (grading) return (
    <div style={{padding:'4rem 2rem',maxWidth:400,margin:'0 auto',textAlign:'center'}}>
      <div style={{fontSize:44,marginBottom:18}}>⏳</div>
      <h2 style={{fontSize:20,fontWeight:700,marginBottom:10}}>채점 중입니다</h2>
      <p style={{fontSize:14,color:'#64748b',marginBottom:28}}>{progMsg}</p>
      <div className="progress-bar" style={{marginBottom:10}}><div className="progress-fill" style={{width:`${prog}%`}}/></div>
      <p style={{fontSize:13,color:'#94a3b8'}}>{prog}%</p>
    </div>
  );

  return (
    <div style={{padding:'1rem',maxWidth:560,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,padding:'0 0.5rem'}}>
        <span style={{fontSize:13,color:'#64748b'}}>{exam.label}</span>
        <span style={{fontSize:13,color:'#64748b',fontWeight:600}}>{idx+1} / {qs.length}</span>
      </div>
      <div className="progress-bar" style={{marginBottom:20}}><div className="progress-fill" style={{width:`${((idx+1)/qs.length)*100}%`}}/></div>

      <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <span style={{fontSize:16,fontWeight:700}}>{idx+1}번</span>
          <span className={`badge badge-${q.cat}`}>{q.cat} 이해</span>
          <span style={{marginLeft:'auto',fontSize:13,color:'#64748b',fontWeight:600}}>{q.pts}점</span>
        </div>
        <p style={{fontSize:15,lineHeight:1.8,marginBottom:q.type==='mc'?18:14,color:'#1e293b'}}>{q.q}</p>
        {q.type==='mc' && q.opts.map((o,i)=>(
          <button key={i} className={`opt-btn ${answers[q.id]===(i+1)?'selected':''}`} onClick={()=>setAns(q.id,i+1)}>
            <span style={{fontWeight:700,marginRight:10,fontSize:16}}>{'①②③④'[i]}</span>{o}
          </button>
        ))}
        {q.type==='essay' && (
          <>
            <div style={{background:'#ede9fe',border:'1px solid #7c3aed',borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:13,color:'#4c1d95'}}>
              ★ 알고 있는 것을 자유롭게 서술하세요 (최대 4점)
            </div>
            <textarea rows={6} placeholder="여기에 답을 쓰세요..." value={answers[q.id]||''} onChange={e=>setAns(q.id,e.target.value)}/>
          </>
        )}
      </div>

      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <button className="btn" style={{flex:1,padding:'14px'}} onClick={()=>setIdx(i=>i-1)} disabled={idx===0}>← 이전</button>
        {idx < qs.length-1
          ? <button className="btn btn-green" style={{flex:1,padding:'14px'}} onClick={()=>setIdx(i=>i+1)}>다음 →</button>
          : <button className="btn btn-green" style={{flex:1,padding:'14px'}} onClick={submit} disabled={!mcDone}>제출하기 ✓</button>
        }
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:5,padding:'0 0.25rem'}}>
        {qs.map((qq,i)=>{
          const done = answers[qq.id]!==undefined && answers[qq.id]!=='';
          return (
            <button key={i} onClick={()=>setIdx(i)}
              style={{width:34,height:34,borderRadius:7,fontSize:12,cursor:'pointer',fontWeight:600,
                border:`2px solid ${i===idx?'#22c55e':done?'#86efac':'#e2e8f0'}`,
                background:i===idx?'#dcfce7':done?'#f0fdf4':'#fff',
                color:i===idx?'#052e16':done?'#16a34a':'#64748b'}}>
              {i+1}
            </button>
          );
        })}
      </div>
    </div>
  );
}

      <h2 style={{fontSize:24,fontWeight:700,marginBottom:14,color:'#052e16'}}>검사 제출 완료!</h2>
      <p style={{fontSize:16,color:'#475569',lineHeight:1.8}}>수고했습니다.<br/>선생님께 완료 사실을 알려주세요.</p>
    </div>

}

/* ══════════════════════════════════════════
   교사 대시보드
══════════════════════════════════════════ */
function TeacherDashboard({ onBack }) {
  const [selGroup, setSelGroup]   = useState('설명집단');
  const [selTest, setSelTest]     = useState('A');
  const [all, setAll]             = useState([]);
  const [loading, setLoading]     = useState(true);
  const [loadErr, setLoadErr]     = useState('');
  const [detailId, setDetailId]   = useState(null);
  const [exporting, setExporting] = useState(false);
  const [checked, setChecked]     = useState({});
  const [deleting, setDeleting]   = useState(false);

  const loadData = useCallback(async () => {
    try {
      const results = await apiLoadAll();
      setAll(results); setLoadErr('');
    } catch (err) { setLoadErr('로드 실패: ' + err.message); }
    finally { setLoading(false); }
  }, []);

  useEffect(()=>{ loadData(); const t=setInterval(loadData,10000); return()=>clearInterval(t); },[loadData]);

  const filtered = all.filter(r=>r.group===selGroup && r.testType===selTest);
  const avg = (arr,fn) => { if(!arr.length) return '-'; return (arr.reduce((a,r)=>a+fn(r),0)/arr.length).toFixed(1); };
  const doExport = (gf,fn) => { setExporting(true); setTimeout(()=>{exportExcel(all,gf,fn);setExporting(false);},100); };

  // 체크박스 key: studentId + '_' + testType
  const ck = (r) => r.studentId + '_' + r.testType;
  const toggleCheck = (r) => setChecked(prev=>({...prev,[ck(r)]:!prev[ck(r)]}));
  const toggleAll   = () => {
    const allChecked = filtered.every(r=>checked[ck(r)]);
    const next = {};
    filtered.forEach(r=>{ next[ck(r)] = !allChecked; });
    setChecked(prev=>({...prev,...next}));
  };
  const checkedList  = filtered.filter(r=>checked[ck(r)]);
  const allChecked   = filtered.length>0 && filtered.every(r=>checked[ck(r)]);

  // 선택 항목 삭제
  const deleteChecked = async () => {
    if (!checkedList.length) { alert('삭제할 항목을 먼저 체크하세요.'); return; }
    const names = checkedList.map(r=>`${r.studentId} (${r.testType}형)`).join('\n');
    const ok = window.confirm(`아래 검사 결과를 삭제합니다.\n삭제 후 복구가 불가능합니다.\n\n${names}`);
    if (!ok) return;
    setDeleting(true);
    setLoadErr('');
    try {
      const items = checkedList.map(r=>({ studentId: r.studentId, testType: r.testType }));
      const res = await fetch(GAS_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain' },
        body:    JSON.stringify({ action: 'delete', items }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || '서버에서 삭제 실패');
      setChecked({});
      await loadData();
      alert(`${data.deleted || checkedList.length}건 삭제 완료`);
    } catch(err) {
      setLoadErr('삭제 오류: ' + err.message);
      alert('삭제 오류: ' + err.message);
    }
    setDeleting(false);
  };

  if (loading) return (
    <div style={{padding:'4rem',textAlign:'center',color:'#64748b'}}>
      <div style={{fontSize:36,marginBottom:12}}>⏳</div>
      <p>Google Sheets에서 데이터 불러오는 중...</p>
    </div>
  );

  /* 상세 */
  if (detailId) {
    const detail = all.find(r=>r.studentId===detailId && r.testType===selTest);
    if (!detail) return <div className="page"><button className="btn" onClick={()=>setDetailId(null)}>← 뒤로</button></div>;
    const qs = EXAMS[selTest].qs;
    return (
      <div className="page" style={{maxWidth:640,margin:'0 auto'}}>
        <button className="btn" style={{marginBottom:16,fontSize:13}} onClick={()=>setDetailId(null)}>← 목록으로</button>
        <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:20,flexWrap:'wrap'}}>
          <h2 style={{fontSize:20,fontWeight:700}}>{detail.studentId}</h2>
          <span className="badge" style={{background:'#dcfce7',color:'#166534'}}>{detail.group}</span>
          <span className="badge badge-사실적">{detail.examLabel}</span>
          <span style={{fontSize:12,color:'#94a3b8',marginLeft:'auto'}}>{detail.timestamp?new Date(detail.timestamp).toLocaleString('ko-KR'):''}</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,minmax(0,1fr))',gap:10,marginBottom:24}}>
          {[['총점',detail.scores.total,40,'#dcfce7','#166534'],['사실적',detail.scores.사실적,10,'#dbeafe','#1e40af'],['적용적',detail.scores.적용적,10,'#fef3c7','#92400e'],['전이적',detail.scores.전이적,20,'#ede9fe','#4c1d95']].map(([lb,sc,mx,bg,tc])=>(
            <div key={lb} style={{background:bg,borderRadius:10,padding:'12px 8px',textAlign:'center'}}>
              <div style={{fontSize:12,color:tc,marginBottom:4,fontWeight:600}}>{lb}</div>
              <div style={{fontSize:22,fontWeight:700,color:tc}}>{sc}<span style={{fontSize:12,fontWeight:400}}>/{mx}</span></div>
            </div>
          ))}
        </div>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>선다형 (1~10번)</h3>
        <div style={{overflowX:'auto',marginBottom:24}}>
          <table>
            <thead><tr><th>번호</th><th>영역</th><th>학생 답</th><th>정답</th><th style={{textAlign:'center'}}>점수</th></tr></thead>
            <tbody>
              {qs.filter(q=>q.type==='mc').map(q=>{
                const ok = detail.answers[q.id]===q.ans;
                return <tr key={q.id}><td style={{fontWeight:600}}>{q.id}번</td><td><span className={`badge badge-${q.cat}`} style={{fontSize:11}}>{q.cat}</span></td><td>{detail.answers[q.id]?'①②③④'[(detail.answers[q.id]||1)-1]:'-'}</td><td style={{fontWeight:600}}>{'①②③④'[q.ans-1]}</td><td style={{textAlign:'center',fontWeight:700,color:ok?'#16a34a':'#dc2626'}}>{ok?q.pts:0}점</td></tr>;
              })}
            </tbody>
          </table>
        </div>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>서술형 (11~15번) — AI 채점 결과</h3>
        {qs.filter(q=>q.type==='essay').map(q=>{
          const g = detail.grades&&detail.grades[q.id];
          const sc = g?g.score:0;
          const col=['#dc2626','#ea580c','#ca8a04','#16a34a','#059669'][sc];
          return (
            <div key={q.id} className="card" style={{marginBottom:12}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <span style={{fontSize:14,fontWeight:700}}>{q.id}번</span>
                <span className="badge badge-전이적">전이적</span>
                <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:32,height:32,borderRadius:'50%',background:col,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:16}}>{sc}</div>
                  <span style={{fontSize:13,color:'#64748b'}}>/4점</span>
                </div>
              </div>
              <div style={{fontSize:13,background:'#f8fafc',borderRadius:8,padding:'10px 12px',marginBottom:8,lineHeight:1.7,border:'1px solid #e2e8f0'}}>
                <div style={{fontSize:11,color:'#94a3b8',marginBottom:4,fontWeight:600}}>학생 답안</div>
                {detail.answers[q.id]||<span style={{color:'#94a3b8',fontStyle:'italic'}}>무응답</span>}
              </div>
              {g&&<div style={{fontSize:12,color:'#4c1d95',background:'#ede9fe',borderRadius:6,padding:'8px 12px'}}><span style={{fontWeight:600}}>AI 피드백</span>: {g.feedback}</div>}
            </div>
          );
        })}
      </div>
    );
  }

  /* 메인 */
  return (
    <div className="page" style={{maxWidth:780,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button className="btn" style={{fontSize:13}} onClick={onBack}>← 처음으로</button>
        <button className="btn" style={{fontSize:13,background:'#f0fdf4',borderColor:'#86efac',color:'#166534'}} onClick={loadData}>↻ 새로고침</button>
        {loadErr&&<span style={{fontSize:12,color:'#dc2626'}}>{loadErr}</span>}
      </div>
      <h2 style={{fontSize:22,fontWeight:700,marginBottom:20}}>교사 결과 대시보드</h2>

      <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:12,padding:'16px 18px',marginBottom:24}}>
        <div style={{fontSize:14,fontWeight:700,color:'#166534',marginBottom:12}}>엑셀 내보내기 — 학생 1명 = 1행</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
          <button className="btn btn-excel" style={{fontSize:13,padding:'10px 18px'}} onClick={()=>doExport('설명집단','개념이해도_설명집단.xlsx')} disabled={exporting}>↓ 설명집단</button>
          <button className="btn btn-excel" style={{fontSize:13,padding:'10px 18px'}} onClick={()=>doExport('질문집단','개념이해도_질문집단.xlsx')} disabled={exporting}>↓ 질문집단</button>
          <button className="btn btn-excel2" style={{fontSize:13,padding:'10px 18px'}} onClick={()=>doExport(null,'개념이해도_전체.xlsx')} disabled={exporting}>↓ 전체 (집단별 시트)</button>
        </div>
        <div style={{fontSize:11,color:'#4d7c0f',lineHeight:1.8}}>
          열 구성: 학생ID · 집단 ·
          <span style={{background:'#bbf7d0',padding:'1px 6px',borderRadius:4,margin:'0 3px'}}>01_총점 · 01_사실 · 01_적용 · 01_전이</span>
          <span style={{background:'#fef08a',padding:'1px 6px',borderRadius:4,margin:'0 3px'}}>02_총점 · 02_사실 · 02_적용 · 02_전이</span>
          <span style={{background:'#ddd6fe',padding:'1px 6px',borderRadius:4,margin:'0 3px'}}>03_총점 · 03_사실 · 03_적용 · 03_전이</span>
        </div>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {['설명집단','질문집단'].map(g=>(
          <button key={g} className={`btn ${selGroup===g?'btn-green':''}`} style={{flex:1,padding:'14px',fontSize:15,fontWeight:selGroup===g?700:400}} onClick={()=>setSelGroup(g)}>{g}</button>
        ))}
      </div>
      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {[['A','사전검사','btn-blue'],['B','사후검사','btn-amber'],['C','파지검사','btn-purple']].map(([k,lb,bc])=>(
          <button key={k} className={`btn ${selTest===k?bc:''}`} style={{flex:1,padding:'11px 4px',fontSize:14}} onClick={()=>setSelTest(k)}>
            <div style={{fontWeight:700}}>{k}형</div><div style={{fontSize:11,marginTop:3,opacity:0.8}}>{lb}</div>
          </button>
        ))}
      </div>

      {filtered.length>0&&(
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
          {[['응시 인원',`${filtered.length}명`,'#dcfce7','#166534'],['총점 평균',avg(filtered,r=>r.scores.total),'#dbeafe','#1e40af'],['사실적 평균',avg(filtered,r=>r.scores.사실적),'#fef3c7','#92400e'],['적용적 평균',avg(filtered,r=>r.scores.적용적),'#fef3c7','#92400e'],['전이적 평균',avg(filtered,r=>r.scores.전이적),'#ede9fe','#4c1d95']].map(([lb,val,bg,tc])=>(
            <div key={lb} style={{background:bg,borderRadius:8,padding:'6px 14px',fontSize:13,color:tc,fontWeight:600}}>{lb}: {val}</div>
          ))}
        </div>
      )}

      {filtered.length===0 ? (
        <div style={{textAlign:'center',padding:'4rem 2rem',color:'#94a3b8',background:'#f8fafc',borderRadius:14,border:'1px dashed #e2e8f0'}}>
          <div style={{fontSize:36,marginBottom:12}}>📋</div>
          <p style={{fontSize:15}}>{selGroup}의 {EXAMS[selTest].label} 결과가 아직 없습니다.</p>
        </div>
      ) : (
        <>
          {/* 삭제 툴바 */}
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,padding:'10px 12px',background:checkedList.length?'#fef2f2':'#f8fafc',borderRadius:8,border:`1px solid ${checkedList.length?'#fca5a5':'#e2e8f0'}`}}>
            <span style={{fontSize:13,color:'#475569'}}>
              {checkedList.length>0 ? `${checkedList.length}개 선택됨` : '행을 선택하면 삭제할 수 있습니다'}
            </span>
            <button
              style={{marginLeft:'auto',padding:'6px 16px',borderRadius:7,border:'1px solid #fca5a5',background:checkedList.length?'#dc2626':'#f1f5f9',color:checkedList.length?'#fff':'#94a3b8',fontWeight:600,fontSize:13,cursor:checkedList.length?'pointer':'not-allowed',fontFamily:'inherit'}}
              onClick={deleteChecked}
              disabled={!checkedList.length||deleting}
            >
              {deleting ? '삭제 중...' : '🗑 선택 삭제'}
            </button>
          </div>

          <div style={{overflowX:'auto'}}>
            <table>
              <thead>
                <tr>
                  <th style={{textAlign:'center',width:36}}>
                    <input type="checkbox" checked={allChecked} onChange={toggleAll} style={{width:15,height:15,cursor:'pointer'}}/>
                  </th>
                  <th>학생 ID</th>
                  <th style={{textAlign:'center',color:'#1e40af'}}>사실적<br/><span style={{fontSize:10,fontWeight:400,color:'#64748b'}}>/10</span></th>
                  <th style={{textAlign:'center',color:'#92400e'}}>적용적<br/><span style={{fontSize:10,fontWeight:400,color:'#64748b'}}>/10</span></th>
                  <th style={{textAlign:'center',color:'#4c1d95'}}>전이적<br/><span style={{fontSize:10,fontWeight:400,color:'#64748b'}}>/20</span></th>
                  <th style={{textAlign:'center',background:'#f0fdf4',color:'#166534'}}>총점<br/><span style={{fontSize:10,fontWeight:400,color:'#64748b'}}>/40</span></th>
                  <th style={{textAlign:'center'}}>제출 시각</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {filtered.sort((a,b)=>a.studentId.localeCompare(b.studentId)).map(r=>(
                  <tr key={r.studentId} style={{background:checked[ck(r)]?'#fef2f2':''}}>
                    <td style={{textAlign:'center'}}>
                      <input type="checkbox" checked={!!checked[ck(r)]} onChange={()=>toggleCheck(r)} style={{width:15,height:15,cursor:'pointer'}}/>
                    </td>
                    <td style={{fontWeight:700}}>{r.studentId}</td>
                    <td className="sc" style={{color:'#1e40af'}}>{r.scores.사실적}</td>
                    <td className="sc" style={{color:'#92400e'}}>{r.scores.적용적}</td>
                    <td className="sc" style={{color:'#4c1d95'}}>{r.scores.전이적}</td>
                    <td className="sc" style={{fontWeight:700,background:'#f0fdf4',color:'#166534'}}>{r.scores.total}</td>
                    <td style={{fontSize:12,color:'#94a3b8',textAlign:'center'}}>{r.timestamp?new Date(r.timestamp).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):'-'}</td>
                    <td><button className="btn" style={{padding:'5px 12px',fontSize:12}} onClick={()=>setDetailId(r.studentId)}>상세보기</button></td>
                  </tr>
                ))}
                {filtered.length>1&&(
                  <tr style={{background:'#f8fafc',fontWeight:700}}>
                    <td></td>
                    <td style={{color:'#475569',fontSize:12}}>평균</td>
                    <td className="sc">{avg(filtered,r=>r.scores.사실적)}</td>
                    <td className="sc">{avg(filtered,r=>r.scores.적용적)}</td>
                    <td className="sc">{avg(filtered,r=>r.scores.전이적)}</td>
                    <td className="sc" style={{color:'#16a34a'}}>{avg(filtered,r=>r.scores.total)}</td>
                    <td></td><td></td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </>
      )}
      <p style={{fontSize:11,color:'#94a3b8',textAlign:'center',marginTop:20}}>10초마다 자동 갱신 | 저장소: Google Sheets</p>
    </div>
  );
}

/* ══════════════════════════════════════════
   교사 비밀번호 입력 화면
══════════════════════════════════════════ */
function TeacherLogin({ onSuccess, onBack }) {
  const [pw, setPw]       = useState('');
  const [err, setErr]     = useState('');
  const [show, setShow]   = useState(false);

  const check = () => {
    if (pw === TEACHER_PASSWORD) {
      onSuccess();
    } else {
      setErr('비밀번호가 틀렸습니다. 다시 입력해 주세요.');
      setPw('');
    }
  };

  const onKey = (e) => { if (e.key === 'Enter') check(); };

  return (
    <div style={{padding:'3rem 1.5rem',maxWidth:400,margin:'0 auto'}}>
      <button className="btn" style={{marginBottom:28,fontSize:13}} onClick={onBack}>← 처음으로</button>

      <div style={{textAlign:'center',marginBottom:32}}>
        <div style={{width:64,height:64,borderRadius:'50%',background:'#dbeafe',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:28}}>🔒</div>
        <h2 style={{fontSize:22,fontWeight:700,marginBottom:6}}>교사 전용</h2>
        <p style={{fontSize:14,color:'#64748b'}}>비밀번호를 입력하세요</p>
      </div>

      <div style={{position:'relative',marginBottom:16}}>
        <input
          type={show ? 'text' : 'password'}
          placeholder="비밀번호 입력"
          value={pw}
          onChange={e=>{setPw(e.target.value);setErr('');}}
          onKeyDown={onKey}
          style={{fontSize:17,paddingRight:48}}
          autoFocus
        />
        <button
          onClick={()=>setShow(s=>!s)}
          style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:18,color:'#94a3b8',padding:4}}
        >
          {show ? '🙈' : '👁️'}
        </button>
      </div>

      {err && (
        <div style={{background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:14,color:'#dc2626'}}>
          {err}
        </div>
      )}

      <button className="btn btn-blue" style={{width:'100%',padding:'16px',fontSize:17}} onClick={check}>
        확인 →
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════
   앱 라우터
══════════════════════════════════════════ */
function App() {
  const [view, setView]   = useState('home');
  const [sInfo, setSInfo] = useState(null);
  const reset = () => { setView('home'); setSInfo(null); };

  if (view==='home')         return <Home onStudent={()=>setView('login')} onTeacher={()=>setView('teacher-login')}/>;
  if (view==='login')        return <StudentLogin onBack={reset} onNext={info=>{setSInfo(info);setView('exam');}}/>;
  if (view==='exam' && sInfo) return <ExamInterface {...sInfo} onDone={()=>setView('done')}/>;
  if (view==='done')         return <StudentDone/>;
  if (view==='teacher-login') return <TeacherLogin onBack={reset} onSuccess={()=>setView('teacher')}/>;
  if (view==='teacher')      return <TeacherDashboard onBack={reset}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
